apiVersion: apps/v1
kind: Deployment
metadata:
  name: botforge-backend
  namespace: botforge
  labels:
    app: botforge-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: botforge-backend
  template:
    metadata:
      labels:
        app: botforge-backend
    spec:
      containers:
        - name: backend
          image: botforge/backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3001'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: botforge-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: botforge-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: botforge-backend
  namespace: botforge
spec:
  selector:
    app: botforge-backend
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
